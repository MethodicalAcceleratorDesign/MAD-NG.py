name: Make a MAD-NG Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Install dependencies
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y build-essential
        elif [ "$RUNNER_OS" = "macOS" ]; then
          brew update
          brew install llvm libomp
        fi

    - name: Select Makefile
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          cp MAD/src/Makefile.lxplus MAD/src/Makefile
          sed -i \
            -e 's#^CC[[:space:]]*=.*#CC=gcc#g' \
            -e 's#^CXX[[:space:]]*=.*#CXX=g++#g' \
            -e 's#-fdiagnostics-all-candidates##g' \
            MAD/src/Makefile || true
        elif [ "$RUNNER_OS" = "macOS" ]; then
          brew_prefix_llvm="$(brew --prefix llvm)"
          cp MAD/src/Makefile.macosx MAD/src/Makefile
          sed -i.bak \
            -e "s#^CC[[:space:]]*=[[:space:]]*gcc#CC=${brew_prefix_llvm}/bin/clang#g" \
            -e "s#^CC[[:space:]]*=[[:space:]]*clang#CC=${brew_prefix_llvm}/bin/clang#g" \
            -e "s#^CXX[[:space:]]*=[[:space:]]*g\\+\\+#CXX=${brew_prefix_llvm}/bin/clang++#g" \
            -e "s#^CXX[[:space:]]*=[[:space:]]*clang\\+\\+#CXX=${brew_prefix_llvm}/bin/clang++#g" \
            -e "s#-fdiagnostics-all-candidates##g" \
            MAD/src/Makefile
        fi

    - name: Stage MAD-NG headers
      run: |
        mkdir -p MAD/tools
        if [ "$RUNNER_OS" = "Linux" ]; then
          cp -f tools/stage_madng_headers_linux.sh MAD/tools/
          chmod +x MAD/tools/stage_madng_headers_linux.sh
          (cd MAD && ./tools/stage_madng_headers_linux.sh)
        elif [ "$RUNNER_OS" = "macOS" ]; then
          cp -f tools/stage_madng_headers_macos.sh MAD/tools/
          chmod +x MAD/tools/stage_madng_headers_macos.sh
          (cd MAD && ./tools/stage_madng_headers_macos.sh)
        fi

    - name: Compile MAD-NG
      working-directory: MAD/src
      run: |
        # GitHub Actions has no TTY/job-control; provide a synchronous `bg` shim.
        mkdir -p "${RUNNER_TEMP}/madng-bin"
        printf '#!/usr/bin/env bash\n[ "$#" -ge 2 ] && "$1" > "$2"\n' \
          > "${RUNNER_TEMP}/madng-bin/bg"
        chmod +x "${RUNNER_TEMP}/madng-bin/bg"
        export PATH="${RUNNER_TEMP}/madng-bin:${PATH}"

        # Include paths the Makefile expects to find in ../lib relative to src/.
        LIB_INCLUDES="-I../lib/luajit/src -I../lib/nlopt/src/api -I../lib/fftw3/api -I../lib/nfft3/include"

        if [ "$RUNNER_OS" = "Linux" ]; then
          export CC=gcc CXX=g++
          export CPPFLAGS="${LIB_INCLUDES}"
        elif [ "$RUNNER_OS" = "macOS" ]; then
          llvm="$(brew --prefix llvm)"
          export PATH="${llvm}/bin:${PATH}"
          export CC="${llvm}/bin/clang" CXX="${llvm}/bin/clang++"
          export CPPFLAGS="${LIB_INCLUDES} -I$(brew --prefix libomp)/include"
          export LDFLAGS="-L$(brew --prefix libomp)/lib -lomp"
          # Avoid x86_64-specific tuning flags on arm64.
          export CFLAGS="-O3 -ftree-vectorize -fPIC -flto"
          export CXXFLAGS="-O3 -ftree-vectorize -fPIC -flto"
        fi

        JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
        make -j"${JOBS}" SHELL=/bin/bash \
          CC="${CC}" CXX="${CXX}" \
          CPPFLAGS="${CPPFLAGS:-}" LDFLAGS="${LDFLAGS:-}" \
          CFLAGS="${CFLAGS:-}" CXXFLAGS="${CXXFLAGS:-}"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-${{ runner.os }}
        path: MAD/src/mad
