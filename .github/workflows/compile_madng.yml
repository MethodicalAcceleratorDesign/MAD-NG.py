# This workflow will install Python dependencies, run tests on a variety Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Make a MAD-NG Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v6

    - name: Clone another repo
      uses: actions/checkout@v6
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Select Makefile
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          cp MAD/src/Makefile.lxplus MAD/src/Makefile
        elif [ "$RUNNER_OS" = "macOS" ]; then
          cp MAD/src/Makefile.macosx MAD/src/Makefile

          # Ensure we use Homebrew LLVM clang (Apple clang doesn't support -fopenmp)
          brew_prefix_llvm="$(brew --prefix llvm)"
          sed -i.bak \
            -e "s#^CC[[:space:]]*=[[:space:]]*gcc#CC=${brew_prefix_llvm}/bin/clang#g" \
            -e "s#^CC[[:space:]]*=[[:space:]]*clang#CC=${brew_prefix_llvm}/bin/clang#g" \
            -e "s#^CXX[[:space:]]*=[[:space:]]*g\\+\\+#CXX=${brew_prefix_llvm}/bin/clang++#g" \
            -e "s#^CXX[[:space:]]*=[[:space:]]*clang\\+\\+#CXX=${brew_prefix_llvm}/bin/clang++#g" \
            MAD/src/Makefile
        else
          echo "Unsupported OS: $RUNNER_OS"
          exit 1
        fi

    - name: Stage MAD-NG headers
      run: |
        mkdir -p MAD/tools
        cp -f tools/stage_madng_headers_linux.sh MAD/tools/ || true
        cp -f tools/stage_madng_headers_macos.sh MAD/tools/ || true
        chmod +x MAD/tools/stage_madng_headers_*.sh

        if [ "$RUNNER_OS" = "Linux" ]; then
          (cd MAD && ./tools/stage_madng_headers_linux.sh)
        elif [ "$RUNNER_OS" = "macOS" ]; then
          (cd MAD && ./tools/stage_madng_headers_macos.sh)
        else
          echo "Unsupported OS: $RUNNER_OS"
          exit 1
        fi

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          clang \
          gcc \
          g++ \
          make \

    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install llvm libomp

    - name: Compile MAD-NG
      working-directory: MAD/src

      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          export CC=clang
          export CXX=clang++
        fi
        if [ "$RUNNER_OS" = "macOS" ]; then
          export PATH="$(brew --prefix llvm)/bin:$PATH"
          export CC="$(brew --prefix llvm)/bin/clang"
          export CXX="$(brew --prefix llvm)/bin/clang++"
          export CPPFLAGS="-I$(brew --prefix libomp)/include"
          export LDFLAGS="-L$(brew --prefix libomp)/lib -lomp"
        fi
        make -j SHELL=/bin/bash

    - name: Upload it
      uses: actions/upload-artifact@v7
      with:
        name: executable-${{ runner.os }}
        path: MAD/src/mad
