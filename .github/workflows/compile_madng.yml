name: Make a MAD-NG Binary

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Build MAD-NG in Rocky Linux 9
      run: |
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/work" \
          -w /work \
          rockylinux:9 \
          bash -lc '
            set -euo pipefail

            dnf install -y dnf-plugins-core
            dnf config-manager --enable crb
            dnf install -y \
              gcc gcc-c++ gcc-gfortran make cmake git \
              libquadmath-devel libquadmath-static \
              libgfortran-static libstdc++-static \
              diffutils findutils sed which tar gzip

            cp MAD/src/Makefile.lxplus MAD/src/Makefile
            sed -i \
              -e '"'"'s#^CC[[:space:]]*=.*#CC=gcc#g'"'"' \
              -e '"'"'s#^CXX[[:space:]]*=.*#CXX=g++#g'"'"' \
              -e '"'"'s#-fdiagnostics-all-candidates##g'"'"' \
              MAD/src/Makefile || true

            mkdir -p MAD/tools
            cp -f tools/build_madng_deps_linux.sh MAD/tools/
            chmod +x MAD/tools/build_madng_deps_linux.sh
            (cd MAD && JOBS="$(nproc)" CC=gcc CXX=g++ FC=gfortran AR=ar RANLIB=ranlib ./tools/build_madng_deps_linux.sh)

            cd MAD/src
            export CC=gcc CXX=g++
            # LIBRARY_PATH makes GCC prepend -L at the START of the ld invocation,
            # before -lgfortran/-lquadmath are seen (unlike LDOPTIONS which comes after).
            gcc_libdir="$(gcc -print-libgcc-file-name | xargs dirname)"
            export LIBRARY_PATH="${gcc_libdir}${LIBRARY_PATH:+:${LIBRARY_PATH}}"
            export LDOPTIONS="-no-pie"

            make SHELL=/bin/bash \
              CC="${CC}" CXX="${CXX}" \
              LDOPTIONS="${LDOPTIONS:-}"

            chmod 755 mad
          '

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-Linux
        path: MAD/src/mad

  build-macos-arm:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Install dependencies
      run: |
        brew update
        brew install gcc make cmake automake libtool pkg-config

    - name: Select Makefile
      run: |
        cp MAD/src/Makefile.macosx MAD/src/Makefile
        sed -i.bak \
          -e "s#^CC[[:space:]]*:=.*#CC       := gcc#g" \
          -e "s#^CXX[[:space:]]*:=.*#CXX      := g++#g" \
          -e "s#^FC[[:space:]]*:=.*#FC       := gfortran#g" \
          -e "s#-fdiagnostics-all-candidates##g" \
          -e "s#-flto##g" \
          -e "s#-march=native##g" \
          -e "s#-mtune=native##g" \
          -e "s#-mfma##g" \
          MAD/src/Makefile

    - name: Build MAD-NG dependencies (README order)
      run: |
        set -euo pipefail

        gcc_prefix="$(brew --prefix gcc)"
        gcc_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gcc-*' ! -name 'gcc-ar*' ! -name 'gcc-nm*' ! -name 'gcc-ranlib*' | sort | tail -n1)"
        gxx_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'g++-*' | sort | tail -n1)"
        gfortran_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gfortran-*' | sort | tail -n1)"
        test -n "${gcc_bin}" && test -n "${gxx_bin}" && test -n "${gfortran_bin}"

        toolshim="${RUNNER_TEMP}/gcc-shim"
        mkdir -p "${toolshim}"
        ln -sf "${gcc_bin}" "${toolshim}/gcc"
        ln -sf "${gxx_bin}" "${toolshim}/g++"
        ln -sf "${gfortran_bin}" "${toolshim}/gfortran"
        export PATH="${toolshim}:$(brew --prefix)/bin:${PATH}"

        export OS=macosx
        export MACOSX_DEPLOYMENT_TARGET=11
        export JOBS="$(sysctl -n hw.ncpu)"

        mkdir -p MAD/bin/macosx

        cd MAD/my_lib

        echo "== LuaJIT (README.luajit) =="
        cd luajit
        make clean
        make -j"${JOBS}" amalg PREFIX="$(pwd)"
        make install PREFIX="$(pwd)"
        cp -f src/libluajit.a ../../bin/macosx/
        cd ..

        echo "== LFS (README.lfs) =="
        cd lfs
        make clean || true
        make lfs.a
        cp -f liblfs.a ../../bin/macosx/
        cd ..

        echo "== LPEG (README.lpeg) =="
        cd lpeg
        make clean || true
        make macosx
        cp -f liblpeg.a ../../bin/macosx/
        cd ..

        echo "== LAPACK (README.lapack) =="
        cd lapack
        cp -f make.inc.example make.inc
        make clean || true
        make -j"${JOBS}" lib
        cp -f liblapack.a librefblas.a ../../bin/macosx/
        cd ..

        echo "== FFTW3 (README.fftw3) =="
        cd fftw3
        make clean || true
        ./configure --disable-shared
        make -j"${JOBS}"
        cp -f .libs/libfftw3.a ../../bin/macosx/
        cd ..

        echo "== NFFT3 (README.nfft3) =="
        cd nfft3
        make clean || true
        ./configure --enable-all --disable-shared \
          --with-fftw3="$(pwd)"/../fftw3 \
          --with-fftw3-libdir="$(pwd)"/../fftw3/.libs \
          --with-fftw3-includedir="$(pwd)"/../fftw3/api
        make -j"${JOBS}"
        cp -f .libs/libnfft3.a ../../bin/macosx/
        cd ..

        echo "== NLOPT (README.nlopt) =="
        cd nlopt
        rm -rf build
        mkdir -p build
        cd build
        cmake -DBUILD_SHARED_LIBS=OFF -DNLOPT_CXX=OFF ..
        make -j"${JOBS}"
        cp -f libnlopt.a ../../../bin/macosx/
        cd ../..

    - name: Compile MAD-NG
      working-directory: MAD/src
      run: |
        gcc_prefix="$(brew --prefix gcc)"
        gcc_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gcc-*' ! -name 'gcc-ar*' ! -name 'gcc-nm*' ! -name 'gcc-ranlib*' | sort | tail -n1)"
        gxx_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'g++-*' | sort | tail -n1)"
        gfortran_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gfortran-*' | sort | tail -n1)"
        test -n "${gcc_bin}" && test -n "${gxx_bin}" && test -n "${gfortran_bin}"
        toolshim="${RUNNER_TEMP}/gcc-shim"
        mkdir -p "${toolshim}"
        ln -sf "${gcc_bin}" "${toolshim}/gcc"
        ln -sf "${gxx_bin}" "${toolshim}/g++"
        ln -sf "${gfortran_bin}" "${toolshim}/gfortran"
        export PATH="${toolshim}:$(brew --prefix)/bin:${PATH}"

        which gcc
        gcc --version
        make SHELL=/bin/bash CC=gcc CXX=g++ FC=gfortran

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-macOS-ARM
        path: MAD/src/mad
