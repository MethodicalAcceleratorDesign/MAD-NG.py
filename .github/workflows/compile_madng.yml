name: Make a MAD-NG Binary

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Build MAD-NG in Rocky Linux 9
      run: |
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/work" \
          -w /work \
          rockylinux:9 \
          bash -lc '
            dnf install -y \
              gcc gcc-c++ gcc-gfortran make git \
              libquadmath-devel \
              diffutils findutils sed which tar gzip

            cp MAD/src/Makefile.lxplus MAD/src/Makefile
            sed -i \
              -e '"'"'s#^CC[[:space:]]*=.*#CC=gcc#g'"'"' \
              -e '"'"'s#^CXX[[:space:]]*=.*#CXX=g++#g'"'"' \
              -e '"'"'s#-fdiagnostics-all-candidates##g'"'"' \
              MAD/src/Makefile || true

            mkdir -p MAD/tools
            cp -f tools/stage_madng_headers_linux.sh MAD/tools/
            chmod +x MAD/tools/stage_madng_headers_linux.sh
            (cd MAD && ./tools/stage_madng_headers_linux.sh)

            cd MAD/src
            export CC=gcc CXX=g++
            export LDOPTIONS="-no-pie"

            if [ -f mad_dynmap.cpp ]; then
              sed -i.bak \
                -e '"'"'s/M::MT/typename M::MT/g'"'"' \
                -e '"'"'s/M::MP/typename M::MP/g'"'"' \
                -e '"'"'s/M::T/typename M::T/g'"'"' \
                -e '"'"'s/M::P/typename M::P/g'"'"' \
                -e '"'"'s/M::R/typename M::R/g'"'"' \
                mad_dynmap.cpp || true
            fi

            make SHELL=/bin/bash \
              CC="${CC}" CXX="${CXX}" \
              LDOPTIONS="${LDOPTIONS:-}"

            chmod 755 mad
          '

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-Linux
        path: MAD/src/mad

  build-macos:
    runs-on: macos-15-intel
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Install dependencies
      run: |
        brew update
        brew install gcc make cmake automake libtool pkg-config

    - name: Select Makefile
      run: |
        cp MAD/src/Makefile.macosx MAD/src/Makefile
        sed -i.bak \
          -e "s#-fdiagnostics-all-candidates##g" \
          -e "s#-flto##g" \
          -e "s#-march=native##g" \
          -e "s#-mtune=native##g" \
          -e "s#-mfma##g" \
          MAD/src/Makefile

    - name: Stage MAD-NG headers
      run: |
        mkdir -p MAD/tools
        cp -f tools/stage_madng_headers_macos.sh MAD/tools/
        chmod +x MAD/tools/stage_madng_headers_macos.sh
        (cd MAD && ./tools/stage_madng_headers_macos.sh)

        mkdir -p MAD/bin/macosx
        if [ -f MAD/lib/luajit/src/libluajit.a ]; then
          cp -f MAD/lib/luajit/src/libluajit.a MAD/bin/macosx/libluajit.a
        else
          echo "Missing MAD/lib/luajit/src/libluajit.a after LuaJIT staging" >&2
          exit 1
        fi

    - name: Rebuild macOS static dependencies
      run: |
        gcc_prefix="$(brew --prefix gcc)"
        gcc_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gcc-*' ! -name 'gcc-ar*' ! -name 'gcc-nm*' ! -name 'gcc-ranlib*' | sort | tail -n1)"
        gxx_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'g++-*' | sort | tail -n1)"
        gfortran_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gfortran-*' | sort | tail -n1)"
        toolshim="${RUNNER_TEMP}/gcc-shim"
        mkdir -p "${toolshim}"
        ln -sf "${gcc_bin}" "${toolshim}/gcc"
        ln -sf "${gxx_bin}" "${toolshim}/g++"
        ln -sf "${gfortran_bin}" "${toolshim}/gfortran"
        PATH="${toolshim}:${PATH}" \
          JOBS="$(sysctl -n hw.ncpu)" \
          CC=gcc CXX=g++ FC=gfortran AR=ar RANLIB=ranlib \
          ./tools/build_madng_deps_macos.sh

    - name: Compile MAD-NG
      working-directory: MAD/src
      run: |
        gcc_prefix="$(brew --prefix gcc)"
        gcc_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gcc-*' ! -name 'gcc-ar*' ! -name 'gcc-nm*' ! -name 'gcc-ranlib*' | sort | tail -n1)"
        gxx_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'g++-*' | sort | tail -n1)"
        gfortran_bin="$(find "${gcc_prefix}/bin" -maxdepth 1 -type f -name 'gfortran-*' | sort | tail -n1)"
        toolshim="${RUNNER_TEMP}/gcc-shim"
        mkdir -p "${toolshim}"
        ln -sf "${gcc_bin}" "${toolshim}/gcc"
        ln -sf "${gxx_bin}" "${toolshim}/g++"
        ln -sf "${gfortran_bin}" "${toolshim}/gfortran"
        export PATH="${toolshim}:${PATH}"

        make SHELL=/bin/bash

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-macOS
        path: MAD/src/mad
