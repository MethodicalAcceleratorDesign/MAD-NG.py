name: Make a MAD-NG Binary

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Build MAD-NG in Rocky Linux 9
      run: |
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/work" \
          -w /work \
          rockylinux:9 \
          bash -lc '
            set -euo pipefail

            dnf install -y dnf-plugins-core
            dnf config-manager --enable crb
            dnf install -y \
              gcc gcc-c++ gcc-gfortran make cmake git \
              libquadmath-devel libquadmath-static \
              libgfortran-static libstdc++-static \
              diffutils findutils sed which tar gzip

            cp MAD/src/Makefile.lxplus MAD/src/Makefile
            sed -i \
              -e '"'"'s#^CC[[:space:]]*=.*#CC=gcc#g'"'"' \
              -e '"'"'s#^CXX[[:space:]]*=.*#CXX=g++#g'"'"' \
              -e '"'"'s#-fdiagnostics-all-candidates##g'"'"' \
              MAD/src/Makefile || true

            mkdir -p MAD/tools
            cp -f tools/build_madng_deps_linux.sh MAD/tools/
            chmod +x MAD/tools/build_madng_deps_linux.sh
            (cd MAD && JOBS="$(nproc)" CC=gcc CXX=g++ FC=gfortran AR=ar RANLIB=ranlib ./tools/build_madng_deps_linux.sh)

            cd MAD/src
            export CC=gcc CXX=g++
            # LIBRARY_PATH makes GCC prepend -L at the START of the ld invocation,
            # before -lgfortran/-lquadmath are seen (unlike LDOPTIONS which comes after).
            gcc_libdir="$(gcc -print-libgcc-file-name | xargs dirname)"
            export LIBRARY_PATH="${gcc_libdir}${LIBRARY_PATH:+:${LIBRARY_PATH}}"
            export LDOPTIONS="-no-pie"

            make SHELL=/bin/bash \
              CC="${CC}" CXX="${CXX}" \
              LDOPTIONS="${LDOPTIONS:-}"

            chmod 755 mad
          '

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-Linux
        path: MAD/src/mad

  build-macos-arm:
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Clone MAD-NG
      uses: actions/checkout@v4
      with:
        repository: MethodicalAcceleratorDesign/MAD-NG
        path: MAD
        submodules: recursive

    - name: Install dependencies
      run: |
        brew update
        brew install gcc@13 make cmake automake libtool pkg-config

    - name: Select Makefile
      run: |
        cp MAD/src/Makefile.macosx MAD/src/Makefile
        sed -i.bak -E \
          -e 's#^CC[[:space:]]*[:?]?=.*#CC = gcc#g' \
          -e 's#^CXX[[:space:]]*[:?]?=.*#CXX = g++#g' \
          -e 's#^FC[[:space:]]*[:?]?=.*#FC = gfortran#g' \
          -e 's#-fdiagnostics-all-candidates##g' \
          -e 's#-flto##g' \
          -e 's#-march=native##g' \
          -e 's#-mtune=native##g' \
          -e 's#-mfma##g' \
          MAD/src/Makefile

    - name: Build MAD-NG dependencies
      run: |
        set -euo pipefail

        gcc_prefix="$(brew --prefix gcc@13)"
        toolshim="${RUNNER_TEMP}/gcc-shim"
        mkdir -p "${toolshim}"

        ln -sf "${gcc_prefix}/bin/gcc-13" "${toolshim}/gcc"
        ln -sf "${gcc_prefix}/bin/g++-13" "${toolshim}/g++"
        ln -sf "${gcc_prefix}/bin/gfortran-13" "${toolshim}/gfortran"

        export PATH="${toolshim}:$(brew --prefix)/bin:${PATH}"
        export OS=macosx
        export MACOSX_DEPLOYMENT_TARGET=11
        export JOBS="$(sysctl -n hw.ncpu)"

        mkdir -p MAD/bin/macosx
        cd MAD/lib

        echo "== LuaJIT =="
        rm -rf luajit
        git clone https://github.com/MethodicalAcceleratorDesign/LuaJIT.git luajit
        cd luajit
        git checkout mad-patch
        make clean || true
        make -j"${JOBS}" amalg PREFIX="$(pwd)"
        make install PREFIX="$(pwd)"
        cp -f src/libluajit.a ../../bin/macosx/
        cd ..

        echo "== LFS =="
        rm -rf lfs
        git clone https://github.com/MethodicalAcceleratorDesign/luafilesystem.git lfs
        cd lfs
        make clean || true
        make lfs.a
        cp -f liblfs.a ../../bin/macosx/
        cd ..

        echo "== LPEG =="
        rm -rf lpeg lpeg-1.1.0 lpeg-1.1.0.tar.gz
        curl -fsSL -o lpeg-1.1.0.tar.gz https://www.inf.puc-rio.br/~roberto/lpeg/lpeg-1.1.0.tar.gz
        tar xvzf lpeg-1.1.0.tar.gz
        ln -s lpeg-1.1.0 lpeg
        cd lpeg
        sed -i.bak -E \
          -e 's#^LUADIR[[:space:]]*=.*#LUADIR = ../luajit/include/luajit-2.1#g' \
          -e 's#^LUALIB[[:space:]]*=.*#LUALIB = ../luajit/lib/libluajit-5.1.a#g' \
          -e 's#^COPT[[:space:]]*=.*#COPT = -O3 -DNDEBUG#g' \
          makefile
        make clean || true
        make macosx
        cp -f liblpeg.a ../../bin/macosx/
        cd ..

        echo "== LAPACK =="
        rm -rf lapack
        git clone https://github.com/Reference-LAPACK/lapack lapack
        cd lapack
        cp -f make.inc.example make.inc
        sed -i.bak -E \
          -e 's#^(CFLAGS[[:space:]]*=[[:space:]]*)#\1-fPIC #g' \
          -e 's#^(FFLAGS[[:space:]]*=[[:space:]]*)#\1-fPIC #g' \
          -e 's#^(FFLAGS_NOOPT[[:space:]]*=[[:space:]]*)#\1-fPIC #g' \
          make.inc
        make clean || true
        make -j"${JOBS}" lib
        cp -f liblapack.a librefblas.a ../../bin/macosx/
        cd ..

        echo "== FFTW3 =="
        rm -rf fftw3 fftw-3.3.10 fftw-3.3.10.tar.gz
        curl -fsSL -o fftw-3.3.10.tar.gz https://www.fftw.org/fftw-3.3.10.tar.gz
        tar xvzf fftw-3.3.10.tar.gz
        ln -s fftw-3.3.10 fftw3
        cd fftw3
        make clean || true
        ./configure --disable-shared
        make -j"${JOBS}"
        cp -f .libs/libfftw3.a ../../bin/macosx/
        cd ..

        echo "== NFFT3 =="
        rm -rf nfft3 nfft-3.5.3 nfft-3.5.3.tar.gz
        curl -fsSL -o nfft-3.5.3.tar.gz https://www-user.tu-chemnitz.de/~potts/nfft/download/nfft-3.5.3.tar.gz
        tar xvzf nfft-3.5.3.tar.gz
        ln -s nfft-3.5.3 nfft3
        cd nfft3
        make clean || true
        ./configure --enable-all --disable-shared \
          --with-fftw3="$(pwd)/../fftw3" \
          --with-fftw3-libdir="$(pwd)/../fftw3/.libs" \
          --with-fftw3-includedir="$(pwd)/../fftw3/api"
        make -j"${JOBS}"
        cp -f .libs/libnfft3.a ../../bin/macosx/
        cd ..

        echo "== NLOPT =="
        rm -rf nlopt
        git clone https://github.com/stevengj/nlopt nlopt
        cd nlopt
        cmake -S . -B build \
          -DBUILD_SHARED_LIBS=OFF \
          -DNLOPT_CXX=OFF
        cmake --build build --parallel "${JOBS}"
        cp -f build/libnlopt.a ../../bin/macosx/

    - name: Compile MAD-NG
      working-directory: MAD/src
      run: |
        set -euo pipefail

        gcc_prefix="$(brew --prefix gcc@13)"
        toolshim="${RUNNER_TEMP}/gcc-shim"
        mkdir -p "${toolshim}"

        ln -sf "${gcc_prefix}/bin/gcc-13" "${toolshim}/gcc"
        ln -sf "${gcc_prefix}/bin/g++-13" "${toolshim}/g++"
        ln -sf "${gcc_prefix}/bin/gfortran-13" "${toolshim}/gfortran"

        export PATH="${toolshim}:$(brew --prefix)/bin:${PATH}"
        export MACOSX_DEPLOYMENT_TARGET=11

        make SHELL=/bin/bash CC=gcc CXX=g++ FC=gfortran

        chmod 755 mad
        file mad
        ./mad -v || ./mad --version || true

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: mad-macOS-ARM
        path: MAD/src/mad